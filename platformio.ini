[env:teensy40]
platform = teensy
board = teensy40
framework = arduino
lib_deps = 
	adafruit/Adafruit TCS34725@^1.4.4
	arkhipenko/TaskScheduler@^4.0.8
    https://github.com/sparkfun/SparkFun_SX1509_Arduino_Library.git#V_2.0.1
    https://github.com/DFRobot/DFRobot_MatrixLidar.git
    Wire
    SPI
lib_ldf_mode = deep+
